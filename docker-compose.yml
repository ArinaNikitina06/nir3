services:
  db:
    image: postgres:16-alpine
    container_name: nir3-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nir3
    volumes:
      - nir3_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nir3"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  nir3_pgdata:
